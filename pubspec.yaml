name: dino_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  photo_view: ^0.15.0

  firebase_core: ^4.0.0
  cloud_firestore: ^6.0.0
  google_fonts: ^6.2.0
  sqflite: ^2.4.2
  path: ^1.9.1
  mobile_scanner: ^7.2.0
  audioplayers: ^6.4.0
  url_launcher: ^6.3.1
  flutter_tts: ^4.2.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.14.1

flutter:

  uses-material-design: true

  assets:
    - assets/banderas/
    - assets/fondos/
    - assets/logo/
    - assets/talleres/
    - assets/iconos/
    - assets/memory/
    - assets/puzzle/
    - assets/excava/
    - assets/minijuegos/
    - assets/alas/
    - assets/sprites/
    - assets/hambre/
    - assets/audios/
    - assets/imagenes/
    - assets/database/gigantes.db
    - assets/qr/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/icono_app.png"